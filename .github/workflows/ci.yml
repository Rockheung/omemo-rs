name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Mon 06:00 UTC — catches Syndace upstream version drift.
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  fixture-drift:
    name: regenerate fixtures and diff
    runs-on: ubuntu-latest
    # Slow because it builds Python wheels (cryptography, libxeddsa). Run
    # weekly so upstream version drift is caught without slowing every PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reference packages
        run: |
          python -m pip install -U pip
          python -m pip install \
            doubleratchet==1.3.0 \
            x3dh==1.3.0 \
            xeddsa==1.2.0 \
            twomemo==2.1.0 \
            'omemo>=2,<3' \
            cryptography pydantic

      - name: Regenerate fixtures
        working-directory: test-vectors
        run: |
          for s in scripts/gen_*.py; do python "$s"; done

      - name: Diff committed fixtures
        run: git diff --exit-code -- test-vectors/fixtures/
