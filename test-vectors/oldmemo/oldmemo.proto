syntax = "proto2";

// Clean-room wire-format definitions for OMEMO 0.3.0
// (`eu.siacs.conversations.axolotl` namespace).
//
// This file is **not** a copy of any AGPL-licensed reference. It is
// authored from the public XEP-0384 v0.3 specification (XSF) plus the
// observed wire bytes of fixtures generated by an external Syndace
// `python-oldmemo` oracle (see ADR-009 for the rationale).
//
// Field numbers, types, and required/optional annotations are forced by
// wire-compatibility with the existing OMEMO 0.3 deployed base; under
// Oracle v Google (US Sup. Ct. 2021) and Lotus v Borland (1st Cir.
// 1995) reasoning, those purely-functional interface elements are not
// protected by copyright on their own.
//
// Note that `OMEMOAuthenticatedMessage` is **not** a protobuf in this
// version of the spec — it is a bare concatenation of the serialised
// `OMEMOMessage` (preceded by a single 0x33 version byte) followed by
// an 8-byte truncated HMAC-SHA-256 tag. See `crates/omemo-oldmemo/src/
// lib.rs` for the encode/decode helpers.

package oldmemo;

// Per-message envelope, distinct field tags from the OMEMO 2 protobuf
// (cf. `test-vectors/twomemo/twomemo.proto`):
//
// * `dh_pub` is tag 1 (twomemo: 3)
// * `n`      is tag 2 (twomemo: 1)
// * `pn`     is tag 3 (twomemo: 2)
// * `ciphertext` is tag 4 (same as twomemo)
//
// The `dh_pub` field carries the 33-byte network-encoded ratchet
// public key (`0x05 || x25519_pub`).
message OMEMOMessage {
    required bytes  dh_pub     = 1;
    required uint32 n          = 2;
    required uint32 pn         = 3;
    optional bytes  ciphertext = 4;
}

// First-message envelope. Carries the X3DH key-exchange parameters
// (`pk_id`, `spk_id`, `ik`, `ek`) and the inner authenticated message
// bytes — note `message` is `bytes`, **not** a submessage, because
// OMEMO 0.3's `OMEMOAuthenticatedMessage` is not a protobuf.
//
// The `unused` slot (tag 5) was kept by upstream for forward-compat;
// receivers ignore it. We mark it optional and never emit it.
message OMEMOKeyExchange {
    required uint32 pk_id   = 1;
    required bytes  ek      = 2;
    required bytes  ik      = 3;
    required bytes  message = 4;
    optional uint32 unused  = 5;
    required uint32 spk_id  = 6;
}
