# nginx site config for the Converse.js E2E fixture.
#
# Serves `index.html` on:
#   * port 80  → mapped to host 8765   (HTTP, localhost-friendly)
#   * port 443 → mapped to host 8766   (HTTPS, LAN-friendly —
#     non-localhost browsers need a secure context for WebCrypto,
#     which OMEMO and SCRAM-SHA-1 both require)
#
# The TLS cert is mounted at /etc/nginx/tls/ from the host's
# `test-vectors/integration/tls/` directory; regenerate via
# `tls/gen-cert.sh` after a network change.

server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;
    autoindex off;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(html)$ {
        add_header Cache-Control "no-cache" always;
    }
}

server {
    listen       443 ssl default_server;
    http2        on;
    server_name  _;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root   /usr/share/nginx/html;
    index  index.html;
    autoindex off;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(html)$ {
        add_header Cache-Control "no-cache" always;
    }
}
