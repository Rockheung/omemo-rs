# nginx site config for the Converse.js E2E fixture.
#
# Serves the static `index.html` (plus its CDN-loaded JS/CSS) on
# port 80 inside the container; docker-compose.yml maps that to
# 127.0.0.1:8080 on the host.

server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # No directory listing — the site is a single page.
    autoindex off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache on the static page (it's just a CDN-loader stub).
    # Bump this if you start vendoring Converse.js locally.
    location ~* \.(html)$ {
        add_header Cache-Control "no-cache" always;
    }
}
