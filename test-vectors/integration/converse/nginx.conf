# nginx config for the omemo-rs Converse.js E2E fixture.
#
# Two server blocks: HTTP on 80 (mapped to host 8765) and HTTPS on
# 443 (mapped to host 8766, TLS terminated here with the
# self-signed cert from `../tls/`). Both serve the same content:
#
#   GET   /                      → Converse.js index page
#   POST  /http-bind/            → reverse-proxy to prosody:5280  (BOSH)
#   GET   /xmpp-websocket        → reverse-proxy to prosody:5280  (WebSocket upgrade)
#
# Putting BOSH/WS on the same origin as the page eliminates two
# whole classes of pain:
#
# * No CORS round-trip — same-origin XHR/WS doesn't need any
#   `Access-Control-*` headers.
# * No SNI mismatch on the BOSH endpoint — nginx terminates TLS for
#   any hostname the cert covers, regardless of what the operator
#   typed in the URL bar (`localhost`, `gpus.lcl`, `192.168.x.y`).
#   Prosody, in contrast, only knows the `localhost` VirtualHost
#   and would reject a non-`localhost` SNI with TLSv1 alert
#   `unrecognized_name`.
#
# Internal nginx → Prosody traffic stays on plain HTTP (5280) over
# the compose private network. Prosody still exposes 5280 directly
# for non-browser automated tests that want to skip the proxy.

# WebSocket upgrade map. Forwarded `Connection` must be "upgrade"
# only when the client sent `Upgrade: websocket`; otherwise plain
# `close` for normal HTTP keep-alive.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream prosody_http {
    server prosody:5280;
}

# Shared content blocks. Defined as a snippet so both server blocks
# below stay byte-identical for the static + proxied bits.
# (nginx doesn't have an `include` for shared `location` blocks
# that's much shorter than just duplicating, so we duplicate.)

server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;
    autoindex off;

    location = / {
        try_files /index.html =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
    }

    location /http-bind/ {
        proxy_pass http://prosody_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /xmpp-websocket {
        proxy_pass http://prosody_http;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 7200s;
    }
}

server {
    listen       443 ssl default_server;
    http2        on;
    server_name  _;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root   /usr/share/nginx/html;
    index  index.html;
    autoindex off;

    location = / {
        try_files /index.html =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
    }

    location /http-bind/ {
        proxy_pass http://prosody_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /xmpp-websocket {
        proxy_pass http://prosody_http;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 7200s;
    }
}
