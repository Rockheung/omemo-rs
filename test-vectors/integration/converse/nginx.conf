# nginx config for the omemo-rs Converse.js E2E fixture.
#
# Two server blocks: HTTP on 80 (mapped to host 8765) and HTTPS on
# 443 (mapped to host 8766, TLS terminated here with the
# self-signed cert from `../tls/`). Both serve the same content:
#
#   GET   /                      → Converse.js index page
#   POST  /http-bind/            → reverse-proxy to xmpp:5280  (BOSH)
#   GET   /xmpp-websocket        → reverse-proxy to xmpp:5280  (WebSocket upgrade)
#
# Putting BOSH/WS on the same origin as the page eliminates the
# CORS round-trip — same-origin XHR/WS doesn't need any
# `Access-Control-*` headers. (ejabberd handles SNI for any
# cert-covered hostname natively, so this proxy isn't strictly
# *required* for SNI like it was on the Prosody fixture, but
# keeping same-origin is still the cleanest browser story.)
#
# Internal nginx → ejabberd traffic stays on plain HTTP (5280)
# over the compose private network. ejabberd still exposes 5280
# directly for non-browser tests that want to skip the proxy.

# WebSocket upgrade map. Forwarded `Connection` must be "upgrade"
# only when the client sent `Upgrade: websocket`; otherwise plain
# `close` for normal HTTP keep-alive.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream xmpp_http {
    server xmpp:5280;
}

# Public DNS for upstream HTTPS (`/dist/*` → JSDelivr) and the
# health-check probe nginx itself does to verify upstreams. The
# alpine image's libc resolves /etc/resolv.conf, but `proxy_pass`
# to an absolute HTTPS URL in nginx wants its own resolver
# directive. valid=300s caches replies.
resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
resolver_timeout 5s;

# Shared content blocks. Defined as a snippet so both server blocks
# below stay byte-identical for the static + proxied bits.
# (nginx doesn't have an `include` for shared `location` blocks
# that's much shorter than just duplicating, so we duplicate.)

server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;
    autoindex off;

    location = / {
        try_files /index.html =404;
    }
    location = /favicon.ico {
        log_not_found off;
        return 204;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
    }

    # Reverse-proxy the Converse.js dist/ tree (entry bundle + all
    # webpack code-split chunks: emojis.js, omemo.js, language
    # packs, ...) onto JSDelivr. Same-origin from the browser's
    # perspective so webpack's hard-coded `dist/` publicPath
    # resolves correctly without WebCrypto / CORS / SNI gotchas.
    location /dist/ {
        proxy_pass https://cdn.jsdelivr.net/npm/converse.js@11.0.0/dist/;
        proxy_ssl_server_name on;
        proxy_ssl_name cdn.jsdelivr.net;
        proxy_set_header Host cdn.jsdelivr.net;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_buffering on;
        proxy_cache_valid 200 7d;
    }

    location /http-bind/ {
        proxy_pass http://xmpp_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /xmpp-websocket {
        proxy_pass http://xmpp_http;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 7200s;
    }
}

server {
    listen       443 ssl default_server;
    http2        on;
    server_name  _;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root   /usr/share/nginx/html;
    index  index.html;
    autoindex off;

    location = / {
        try_files /index.html =404;
    }
    location = /favicon.ico {
        log_not_found off;
        return 204;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
    }

    location /dist/ {
        proxy_pass https://cdn.jsdelivr.net/npm/converse.js@11.0.0/dist/;
        proxy_ssl_server_name on;
        proxy_ssl_name cdn.jsdelivr.net;
        proxy_set_header Host cdn.jsdelivr.net;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_buffering on;
        proxy_cache_valid 200 7d;
    }

    location /http-bind/ {
        proxy_pass http://xmpp_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /xmpp-websocket {
        proxy_pass http://xmpp_http;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 7200s;
    }
}
