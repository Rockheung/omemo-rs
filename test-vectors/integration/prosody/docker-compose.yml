# Integration stack for omemo-rs.
#
# Two services:
#
# * `prosody`  — Prosody 13.x XMPP server. Exposes 5222 (C2S TCP)
#   plus 5280 (HTTP BOSH + WebSocket) and 5281 (HTTPS BOSH +
#   WebSocket, using the cert mounted from `../tls/`).
# * `converse` — nginx serving the Converse.js E2E fixture from
#   `../converse/index.html` on http://*:8765 AND https://*:8766.
#   Both ports are needed because LAN browsers (non-localhost)
#   require a secure context for WebCrypto; the page picks the
#   matching scheme automatically (see ../converse/index.html).
#   Ports 8765/8766 were chosen to avoid the contested 8080.
#   See `docs/converse-e2e.md` for the multi-session workflow.
#
# Pre-flight: run `bash test-vectors/integration/tls/gen-cert.sh`
# once to mint the self-signed cert. Re-run after a network
# change so the new LAN IP gets baked into the SAN list.
#
# Bind posture: ports are exposed on **all interfaces (0.0.0.0)**
# so a phone / second laptop on the same LAN can attach to the
# fixture for cross-device testing. The Converse.js page derives
# the BOSH/WebSocket URL from `window.location.hostname` at runtime
# (see ../converse/index.html), so any host that reaches the
# server's port 8765 will also reach 5280 with the same hostname.
# Security note: SASL PLAIN flows over plain TCP/HTTP — fine on a
# trusted LAN, NOT acceptable over the public internet. Production
# deployments should front 5281 with a real cert and bind 5222 to
# a VPN / wg interface only.
#
# Common commands:
#   docker compose -f test-vectors/integration/prosody/docker-compose.yml up -d
#   docker compose -f .../docker-compose.yml ps
#   docker compose -f .../docker-compose.yml logs -f prosody
#   docker compose -f .../docker-compose.yml down -v
#
# Pre-registered accounts (one set per use case):
#   alice / bob / charlie         — early Stage 4 connect+PEP tests
#   gate_a / gate_b               — Stage 4 1:1 gate
#   muc_a..muc_g                  — Stage 5 MUC integration
#   cli_a / cli_b                 — omemo-rs-cli binary spawn
#   pyint_a / pyint_b             — Stage 6+7 cross-impl interop
#   e2e_alice / e2e_bob / e2e_carol / e2e_dave
#                                 — Stage 8 manual multi-session E2E
#   (passwords: `<account>pass` for the simple ones,
#               `e2e<name>pass` for the e2e_* ones — see
#               `Dockerfile` ENTRYPOINT for the full table.)

services:
  prosody:
    build:
      context: .
      dockerfile: Dockerfile
    image: omemo-rs/prosody:local
    container_name: omemo-rs-prosody
    ports:
      - "0.0.0.0:5222:5222"
      - "0.0.0.0:5280:5280"
      - "0.0.0.0:5281:5281"
    volumes:
      - prosody-data:/var/lib/prosody
      # Self-signed TLS cert generated by
      # `test-vectors/integration/tls/gen-cert.sh`. Shared with the
      # nginx sibling so both endpoints present the same identity.
      - ../tls/cert.pem:/etc/prosody/tls/cert.pem:ro
      - ../tls/key.pem:/etc/prosody/tls/key.pem:ro
    healthcheck:
      test: ["CMD", "prosodyctl", "status"]
      interval: 3s
      timeout: 5s
      retries: 20

  converse:
    image: nginx:1-alpine
    container_name: omemo-rs-converse
    depends_on:
      prosody:
        condition: service_healthy
    ports:
      - "0.0.0.0:8765:80"
      - "0.0.0.0:8766:443"
    volumes:
      - ../converse/index.html:/usr/share/nginx/html/index.html:ro
      - ../converse/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../tls/cert.pem:/etc/nginx/tls/cert.pem:ro
      - ../tls/key.pem:/etc/nginx/tls/key.pem:ro
    # nginx:1-alpine ships busybox httpd-only — neither curl nor a
    # wget that handles `-q` is in the image. The container being
    # `Up` is sufficient; nginx is rock-stable here. (If you really
    # want a healthcheck, a `curl`-bearing image like
    # `nginx:1-alpine-slim`+`apk add curl` works.)

volumes:
  prosody-data:
