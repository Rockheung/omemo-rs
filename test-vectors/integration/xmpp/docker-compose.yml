# Integration stack for omemo-rs — XMPP server (ejabberd) +
# Converse.js E2E rig.
#
# Two services:
#
# * `xmpp`     — ejabberd 23.x. Exposes 5222 (C2S TCP + StartTLS),
#   5280 (HTTP: BOSH + WebSocket + admin/api), 5281 (HTTPS: same +
#   web admin console at https://<host>:5281/admin/).
# * `converse` — nginx serving the Converse.js E2E fixture from
#   `../converse/index.html` on http://*:8765 AND https://*:8766.
#   Both ports are needed because LAN browsers (non-localhost)
#   require a secure context for WebCrypto. nginx also reverse-
#   proxies the Converse.js dist tree from JSDelivr same-origin so
#   webpack code-split chunks resolve correctly.
#
# Bind posture: ports are exposed on **all interfaces (0.0.0.0)**
# so a phone / second laptop on the same LAN can attach. The TLS
# cert covers every name in the cert SAN (see
# `../tls/gen-cert.sh`). NOT for public-internet exposure (SASL
# PLAIN over plain TCP/HTTP is allowed for the dev fixture).
#
# Pre-flight: run `bash test-vectors/integration/tls/gen-cert.sh`
# once to mint the self-signed cert. Re-run after a network change
# so a new LAN IP / hostname gets baked into SAN.
#
# Common commands:
#   docker compose -f test-vectors/integration/xmpp/docker-compose.yml up -d
#   docker compose -f .../docker-compose.yml ps
#   docker compose -f .../docker-compose.yml logs -f xmpp
#   docker compose -f .../docker-compose.yml down -v
#
# Pre-registered accounts (one set per use case; created via
# `CTL_ON_CREATE` on first volume mount):
#
#   alice / bob / charlie         — early Stage 4 connect+PEP tests
#   gate_a / gate_b               — Stage 4 1:1 gate
#   muc_a..muc_g                  — Stage 5 MUC integration
#   cli_a / cli_b                 — omemo-rs-cli binary spawn
#   pyint_a / pyint_b             — Stage 6+7 cross-impl interop
#   e2e_alice / e2e_bob / e2e_carol / e2e_dave
#                                 — Stage 8 manual multi-session E2E
#   (passwords: `<account>pass` for the simple ones,
#               `e2e<name>pass` for the e2e_* ones)

services:
  xmpp:
    image: ghcr.io/processone/ejabberd:23.10
    container_name: omemo-rs-xmpp
    user: ejabberd
    ports:
      - "0.0.0.0:5222:5222"
      - "0.0.0.0:5280:5280"
      - "0.0.0.0:5281:5281"
    volumes:
      - xmpp-data:/home/ejabberd/database
      # Drop-in config (overrides the image's default ejabberd.yml).
      - ./ejabberd.yml:/opt/ejabberd/conf/ejabberd.yml:ro
      # Self-signed TLS cert generated by ../tls/gen-cert.sh.
      # Shared with the nginx sibling so both endpoints present
      # the same identity.
      - ../tls/cert.pem:/opt/ejabberd/conf/cert.pem:ro
      - ../tls/key.pem:/opt/ejabberd/conf/key.pem:ro
    environment:
      ERLANG_NODE: ejabberd@localhost
      # `CTL_ON_CREATE` runs `ejabberdctl <args>` once on first
      # boot (or after `down -v`). One ` ; ` separated command per
      # account creation.
      CTL_ON_CREATE: |
        register alice localhost alicepass ;
        register bob localhost bobpass ;
        register charlie localhost charliepass ;
        register gate_a localhost gateapass ;
        register gate_b localhost gatebpass ;
        register muc_a localhost mucapass ;
        register muc_b localhost mucbpass ;
        register muc_c localhost muccpass ;
        register muc_d localhost mucdpass ;
        register muc_e localhost mucepass ;
        register muc_f localhost mucfpass ;
        register muc_g localhost mucgpass ;
        register cli_a localhost cliapass ;
        register cli_b localhost clibpass ;
        register pyint_a localhost pyintapass ;
        register pyint_b localhost pyintbpass ;
        register e2e_alice localhost e2ealicepass ;
        register e2e_bob localhost e2ebobpass ;
        register e2e_carol localhost e2ecarolpass ;
        register e2e_dave localhost e2edavepass
    healthcheck:
      test: ["CMD", "ejabberdctl", "status"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s

  converse:
    image: nginx:1-alpine
    container_name: omemo-rs-converse
    depends_on:
      xmpp:
        condition: service_healthy
    ports:
      - "0.0.0.0:8765:80"
      - "0.0.0.0:8766:443"
    volumes:
      - ../converse/index.html:/usr/share/nginx/html/index.html:ro
      - ../converse/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../tls/cert.pem:/etc/nginx/tls/cert.pem:ro
      - ../tls/key.pem:/etc/nginx/tls/key.pem:ro

volumes:
  xmpp-data:
