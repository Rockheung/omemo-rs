# ejabberd configuration for the omemo-rs integration stack.
#
# Replaces the previous Prosody fixture (Stages 0–8) with an
# enterprise-grade XMPP server. Same external surface (5222 / 5280
# / 5281) so existing automated tests (`tests/gate.rs`,
# `tests/python_interop.rs`, `tests/muc.rs`) keep passing.
#
# Bonuses over Prosody:
#   * Native web admin console at /admin/  (alice@localhost / alicepass).
#   * REST + GraphQL admin API at /api/.
#   * SNI handles any cert SAN out of the box (no VirtualHost stubs).
#   * Mnesia clustering, Prometheus metrics if needed.

hosts:
  - localhost

# ---------------------------------------------------------------------------
# Listening sockets
# ---------------------------------------------------------------------------

listen:
  -
    port: 5222
    ip: "::"
    module: ejabberd_c2s
    max_stanza_size: 262144
    shaper: c2s_shaper
    access: c2s
    starttls: true
    starttls_required: false

  -
    port: 5280
    ip: "::"
    module: ejabberd_http
    tls: false
    request_handlers:
      /admin: ejabberd_web_admin
      /api: mod_http_api
      /bosh: mod_bosh
      /http-bind: mod_bosh
      /websocket: ejabberd_http_ws
      /xmpp-websocket: ejabberd_http_ws

  -
    port: 5281
    ip: "::"
    module: ejabberd_http
    tls: true
    request_handlers:
      /admin: ejabberd_web_admin
      /api: mod_http_api
      /bosh: mod_bosh
      /http-bind: mod_bosh
      /websocket: ejabberd_http_ws
      /xmpp-websocket: ejabberd_http_ws

# ---------------------------------------------------------------------------
# TLS
# ---------------------------------------------------------------------------
#
# Same self-signed cert generated by `../tls/gen-cert.sh`. ejabberd
# accepts both files in `certfiles:` (cert + key, both PEM), so no
# separate concatenated `server.pem` needed.

certfiles:
  - /opt/ejabberd/conf/cert.pem
  - /opt/ejabberd/conf/key.pem

# ---------------------------------------------------------------------------
# Access / shapers
# ---------------------------------------------------------------------------

acl:
  local:
    user_regexp: ""
  admin:
    user:
      - "alice@localhost"
  loopback:
    ip:
      - "127.0.0.0/8"
      - "::1/128"

access_rules:
  local:
    - allow: local
  c2s:
    - allow: all
  announce:
    - allow: admin
  configure:
    - allow: admin
  muc_create:
    - allow: local
  pubsub_createnode:
    - allow: local
  trusted_network:
    - allow: loopback
  register:
    # Pre-baked accounts via `CTL_ON_CREATE` (docker-compose.yml).
    # Block runtime in-band registration so the test fixture stays
    # deterministic.
    - deny: all

api_permissions:
  "console commands":
    from:
      - ejabberd_ctl
    who: all
    what: "*"
  "admin access":
    who:
      access:
        allow:
          - acl: loopback
          - acl: admin
    what:
      - "*"
      - "!stop"
      - "!start"

shaper:
  normal: 3000
  fast: 100000

shaper_rules:
  max_user_sessions: 10
  max_user_offline_messages:
    5000: admin
    100: all
  c2s_shaper:
    none: admin
    normal: all

# ---------------------------------------------------------------------------
# Modules
# ---------------------------------------------------------------------------

modules:
  mod_adhoc: {}
  mod_admin_extra: {}
  mod_announce:
    access: announce
  mod_avatar: {}
  mod_blocking: {}
  mod_bosh: {}
  mod_caps: {}
  mod_carboncopy: {}
  mod_client_state: {}
  mod_configure: {}
  mod_disco: {}
  mod_http_api: {}
  mod_last: {}
  mod_mam:
    assume_mam_usage: true
    default: never
  mod_muc:
    host: "conference.localhost"
    access:
      - allow
    access_admin:
      - allow: admin
    access_create: muc_create
    access_persistent: muc_create
    access_mam:
      - allow
    default_room_options:
      mam: true
      anonymous: false
      members_only: false
      public: true
      public_list: true
  mod_muc_admin: {}
  mod_offline:
    access_max_user_messages: max_user_offline_messages
  mod_ping: {}
  mod_privacy: {}
  mod_private: {}
  # PEP / PubSub for OMEMO bundle/devicelist nodes. Default access
  # model is `open` so first-contact bundle fetches don't fail with
  # `presence-subscription-required` (the same gotcha that bit us
  # on Prosody's `pep_simple`).
  mod_pubsub:
    access_createnode: pubsub_createnode
    ignore_pep_from_offline: false
    last_item_cache: true
    plugins:
      - pep
      - flat
    default_node_config:
      access_model: open
      send_last_published_item: on_sub_and_presence
  mod_roster:
    versioning: true
  mod_sic: {}
  mod_stream_mgmt:
    resend_on_timeout: if_offline
  mod_time: {}
  mod_vcard: {}
  mod_vcard_xupdate: {}
  mod_version: {}

# ---------------------------------------------------------------------------
# Auth + storage
# ---------------------------------------------------------------------------

auth_method: internal
default_db: mnesia
default_ram_db: mnesia

# No federation in the fixture.
s2s_use_starttls: false

language: en
loglevel: info
